name: Build Ladybird Portable

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  schedule:
    - cron: '0 */48 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ----------------------------
      # BASE SYSTEM
      # ----------------------------
      - name: Update and install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            ninja-build \
            cmake \
            curl \
            qt6-base-dev \
            qt6-wayland-dev \
            qt6-multimedia-dev \
            libgl1-mesa-dev \
            ffmpeg \
            fonts-liberation \
            nasm \
            unzip \
            zip \
            patchelf \
            imagemagick \
            wget

      # ----------------------------
      # BUILDER USER
      # ----------------------------
      - name: Create builder user
        run: |
          sudo useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" | sudo tee -a /etc/sudoers

      # ----------------------------
      # FIX WORKSPACE PERMISSIONS
      # ----------------------------
      - name: Fix workspace ownership
        run: |
          sudo chown -R builder:builder "$GITHUB_WORKSPACE"

      # ----------------------------
      # CLONE LADYBIRD SOURCE
      # ----------------------------
      - name: Clone Ladybird source
        run: |
          sudo -u builder git clone https://aur.archlinux.org/ladybird.git

      # ----------------------------
      # BUILD LADYBIRD
      # ----------------------------
      - name: Build Ladybird from AUR
        run: |
          cd ladybird
          sudo -u builder env MAKEFLAGS="-j$(nproc)" makepkg -s --noconfirm

      # ----------------------------
      # CREATE PORTABLE BUNDLE
      # ----------------------------
      - name: Create portable bundle
        run: |
          set -e

          BINARY=$(find ladybird/pkg -type f -name 'Ladybird')
          echo "Found binary: $BINARY"

          PORTABLE=Ladybird-portable
          mkdir -p "$PORTABLE/bin"
          mkdir -p "$PORTABLE/lib"
          mkdir -p "$PORTABLE/plugins"

          cp "$BINARY" "$PORTABLE/bin/"

          # Copy required shared libraries
          ldd "$BINARY" | awk '{print $3}' | grep '/' | while read lib; do
            echo "Copying $lib"
            cp -v "$lib" "$PORTABLE/lib/" || true
          done

          # Copy Qt6 plugins
          if [ -d "/usr/lib/qt6/plugins" ]; then
            cp -r /usr/lib/qt6/plugins/* "$PORTABLE/plugins/"
          fi

          # Patch rpath so binary looks in ./lib
          patchelf --set-rpath '$ORIGIN/../lib' "$PORTABLE/bin/Ladybird"

          # Create launcher
          cat > "$PORTABLE/Ladybird.sh" << 'EOF'
          #!/usr/bin/env bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"
          export QT_PLUGIN_PATH="$DIR/plugins"
          exec "$DIR/bin/Ladybird" "$@"
          EOF

          chmod +x "$PORTABLE/Ladybird.sh"

          # Compress the portable bundle
          tar -czf ladybird-linux-x86_64.tar.gz "$PORTABLE"

      # ----------------------------
      # UPLOAD PORTABLE ARTIFACT
      # ----------------------------
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-linux-x86_64
          path: ladybird-linux-x86_64.tar.gz

      # ----------------------------
      # RELEASE (TAGS ONLY)
      # ----------------------------
      - name: Upload to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ladybird-linux-x86_64.tar.gz
