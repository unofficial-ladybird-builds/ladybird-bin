name: Build Ladybird AppImage

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  schedule:
    - cron: '0 */48 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ubuntu:22.04   # IMPORTANT: Required for linuxdeployqt

    steps:
      # ----------------------------
      # BASE SYSTEM
      # ----------------------------
      - name: Install build dependencies
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install -y \
            autoconf autoconf-archive automake build-essential \
            ccache curl fonts-liberation2 git libdrm-dev \
            libgl1-mesa-dev libtool nasm ninja-build pkg-config \
            python3-venv qt6-base-dev qt6-tools-dev-tools \
            qt6-wayland qt6-multimedia-dev \
            tar unzip zip wget imagemagick

      # ----------------------------
      # INSTALL CMAKE 3.30+
      # ----------------------------
      - name: Install modern CMake
        run: |
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor - \
            | tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null

          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] \
            https://apt.kitware.com/ubuntu/ jammy main" \
            | tee /etc/apt/sources.list.d/kitware.list

          apt update
          apt install -y cmake

      # ----------------------------
      # INSTALL RUST
      # ----------------------------
      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # ----------------------------
      # CLONE LADYBIRD
      # ----------------------------
      - name: Clone Ladybird
        run: |
          git clone https://github.com/LadybirdBrowser/ladybird.git
          cd ladybird
          git submodule update --init --recursive

      # ----------------------------
      # BUILD LADYBIRD
      # ----------------------------
      - name: Build Ladybird
        run: |
          cd ladybird
          cmake -B build -S . -GNinja -DCMAKE_BUILD_TYPE=Release
          ninja -C build

      # ----------------------------
      # PREPARE AppDir
      # ----------------------------
      - name: Prepare AppDir
        run: |
          set -e
          APPDIR=ladybird/AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp ladybird/build/bin/Ladybird "$APPDIR/usr/bin/"

          mkdir -p "$APPDIR/usr/share/applications"
          echo "[Desktop Entry]" > "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Type=Application" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Name=Ladybird" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Exec=Ladybird" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Icon=ladybird" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Comment=Ladybird web browser" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Categories=Network;WebBrowser;" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Terminal=false" >> "$APPDIR/usr/share/applications/Ladybird.desktop"

          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          convert -size 256x256 xc:none \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/ladybird.png" || true

      # ----------------------------
      # DOWNLOAD linuxdeployqt
      # ----------------------------
      - name: Download linuxdeployqt
        run: |
          wget -O linuxdeployqt.AppImage \
            https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt.AppImage

      # ----------------------------
      # CREATE AppImage (NO FUSE)
      # ----------------------------
      - name: Create AppImage
        run: |
          export QT_QPA_PLATFORM=xcb

          ./linuxdeployqt.AppImage --appimage-extract
          ./squashfs-root/AppRun \
            ladybird/AppDir/usr/share/applications/Ladybird.desktop \
            -appimage

      # ----------------------------
      # UPLOAD ARTIFACT
      # ----------------------------
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ladybird-AppImage
          path: "*.AppImage"

      # ----------------------------
      # RELEASE (TAGS ONLY)
      # ----------------------------
      - name: Upload to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.AppImage"
