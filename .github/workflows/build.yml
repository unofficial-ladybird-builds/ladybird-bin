name: Build Ladybird (AppImage)

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  schedule:
    - cron: '0 */48 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    container:
      image: archlinux:latest

    steps:
      # ----------------------------
      # BASE SYSTEM
      # ----------------------------
      - name: Initialize Arch Linux
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel \
            git \
            sudo \
            ninja \
            cmake \
            curl \
            qt6-base \
            qt6-tools \
            qt6-wayland \
            qt6-multimedia \
            libgl \
            ffmpeg \
            ttf-liberation \
            nasm \
            unzip \
            zip \
            patchelf \
            wget \
            imagemagick

      # ----------------------------
      # BUILDER USER
      # ----------------------------
      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      # ----------------------------
      # FIX WORKSPACE PERMISSIONS
      # ----------------------------
      - name: Fix workspace ownership
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"

      # ----------------------------
      # FETCH AUR PKGBUILD
      # ----------------------------
      - name: Clone Ladybird AUR repo
        run: |
          sudo -u builder git clone https://aur.archlinux.org/ladybird.git

      # ----------------------------
      # BUILD PACKAGE
      # ----------------------------
      - name: Build Ladybird from AUR
        run: |
          cd ladybird
          sudo -u builder env MAKEFLAGS="-j$(nproc)" makepkg -s --noconfirm

      # ----------------------------
      # PREPARE AppDir
      # ----------------------------
      - name: Prepare AppDir
        run: |
          set -e

          BINARY=$(find ladybird/pkg -type f -name 'Ladybird')
          echo "Found binary: $BINARY"

          APPDIR=ladybird/AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp "$BINARY" "$APPDIR/usr/bin/"

          # Bundle Qt6 plugins safely (Qt6 layout on Arch)
          mkdir -p "$APPDIR/usr/lib/qt6/plugins"

          for dir in platforms multimedia imageformats; do
            if [ -d "/usr/lib/qt6/plugins/$dir" ]; then
              echo "Copying Qt6 plugin directory: $dir"
              cp -r "/usr/lib/qt6/plugins/$dir" "$APPDIR/usr/lib/qt6/plugins/"
            else
              echo "Skipping missing plugin dir: $dir"
            fi
          done

          # Create desktop entry
          mkdir -p "$APPDIR/usr/share/applications"

          echo "[Desktop Entry]" > "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Type=Application" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Name=Ladybird" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Exec=Ladybird" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Icon=ladybird" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Comment=Ladybird web browser" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Categories=Network;WebBrowser;" >> "$APPDIR/usr/share/applications/Ladybird.desktop"
          echo "Terminal=false" >> "$APPDIR/usr/share/applications/Ladybird.desktop"

          # Create placeholder icon (prevents AppImage build failure)
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          convert -size 256x256 xc:none \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/ladybird.png" || true

      # ----------------------------
      # DOWNLOAD linuxdeployqt
      # ----------------------------
      - name: Download linuxdeployqt
        run: |
          wget -O linuxdeployqt.AppImage \
            https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt.AppImage

      # ----------------------------
      # CREATE AppImage
      # ----------------------------
      - name: Create AppImage
        run: |
          export QT_QPA_PLATFORM=xcb
          ./linuxdeployqt.AppImage \
            ladybird/AppDir/usr/share/applications/Ladybird.desktop \
            -appimage

      # ----------------------------
      # UPLOAD ARTIFACT
      # ----------------------------
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-appimage
          path: "ladybird/AppDir/*.AppImage"

      # ----------------------------
      # RELEASE (TAGS ONLY)
      # ----------------------------
      - name: Upload to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ladybird/AppDir/*.AppImage
