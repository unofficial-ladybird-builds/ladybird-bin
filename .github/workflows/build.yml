name: Build Ladybird AppImage

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:
  schedule:
    - cron: '0 */48 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ubuntu:22.04   # REQUIRED for portable AppImage (glibc 2.35)

    steps:
      # --------------------------------------------------
      # BASE DEPENDENCIES
      # --------------------------------------------------
      - name: Install base dependencies
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install -y \
            autoconf autoconf-archive automake build-essential \
            ccache curl fonts-liberation2 git libdrm-dev \
            libgl1-mesa-dev libtool nasm ninja-build pkg-config \
            python3-venv qt6-base-dev qt6-tools-dev-tools \
            qt6-wayland qt6-multimedia-dev \
            libpulse-dev \
            tar unzip zip wget imagemagick \
            software-properties-common gnupg ca-certificates libfmt-dev

      # --------------------------------------------------
      # CMAKE 3.30+
      # --------------------------------------------------
      - name: Install modern CMake
        run: |
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor - \
            | tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null

          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] \
            https://apt.kitware.com/ubuntu/ jammy main" \
            > /etc/apt/sources.list.d/kitware.list

          apt update
          apt install -y cmake

      # --------------------------------------------------
      # LLVM 21
      # --------------------------------------------------
      - name: Install LLVM 21
        run: |
          wget -O /usr/share/keyrings/llvm-snapshot.gpg.key \
            https://apt.llvm.org/llvm-snapshot.gpg.key

          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg.key] \
            https://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" \
            > /etc/apt/sources.list.d/llvm.list

          apt update
          apt install -y \
            clang-21 clangd-21 clang-tools-21 \
            clang-format-21 clang-tidy-21 \
            lld-21

      # --------------------------------------------------
      # RUST
      # --------------------------------------------------
      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # --------------------------------------------------
      # INSTALL simdutf
      # --------------------------------------------------
      - name: Install simdutf
        run: |
          git clone https://github.com/simdutf/simdutf.git
          cd simdutf
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cmake --install build

      # --------------------------------------------------
      # INSTALL FastFloat
      # --------------------------------------------------
      - name: Install FastFloat
        run: |
          git clone https://github.com/fastfloat/fast_float.git
          cd fast_float
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cmake --install build

      # --------------------------------------------------
      # CLONE LADYBIRD
      # --------------------------------------------------
      - name: Clone Ladybird
        run: |
          git clone https://github.com/LadybirdBrowser/ladybird.git
          cd ladybird
          git submodule update --init --recursive

      # --------------------------------------------------
      # BUILD LADYBIRD
      # --------------------------------------------------
      - name: Build Ladybird
        run: |
          cd ladybird

          export CC=clang-21
          export CXX=clang++-21

          cmake -B build -S . \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_LINKER=lld-21 \
            -DCMAKE_PREFIX_PATH=/usr/local

          ninja -C build

      # --------------------------------------------------
      # PREPARE AppDir
      # --------------------------------------------------
      - name: Prepare AppDir
        run: |
          set -e
          APPDIR=ladybird/AppDir

          mkdir -p "$APPDIR/usr/bin"
          cp ladybird/build/bin/Ladybird "$APPDIR/usr/bin/"

          mkdir -p "$APPDIR/usr/share/applications"
          cat > "$APPDIR/usr/share/applications/Ladybird.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=Ladybird
          Exec=Ladybird
          Icon=ladybird
          Comment=Ladybird web browser
          Categories=Network;WebBrowser;
          Terminal=false
          EOF

          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          convert -size 256x256 xc:none \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/ladybird.png" || true

      # --------------------------------------------------
      # DOWNLOAD linuxdeployqt
      # --------------------------------------------------
      - name: Download linuxdeployqt
        run: |
          wget -O linuxdeployqt.AppImage \
            https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt.AppImage

      # --------------------------------------------------
      # BUILD AppImage (no FUSE)
      # --------------------------------------------------
      - name: Create AppImage
        run: |
          export QT_QPA_PLATFORM=xcb

          ./linuxdeployqt.AppImage --appimage-extract
          ./squashfs-root/AppRun \
            ladybird/AppDir/usr/share/applications/Ladybird.desktop \
            -appimage

      # --------------------------------------------------
      # UPLOAD ARTIFACT
      # --------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ladybird-AppImage
          path: "*.AppImage"

      # --------------------------------------------------
      # RELEASE ON TAG
      # --------------------------------------------------
      - name: Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.AppImage"
