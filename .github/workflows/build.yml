name: Build Ladybird Portable (Nix AppImage)

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:
  schedule:
    - cron: "0 */48 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Show system info
        run: |
          echo "Runner architecture:"
          uname -a
          echo "CPU info:"
          lscpu
          echo "Nix version:"
          nix --version

      - name: Build Ladybird AppImage
        run: |
          nix build github:nix-community/nix-environments#ladybird

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp result/bin/Ladybird*.AppImage dist/Ladybird-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ladybird-AppImage
          path: dist/Ladybird-x86_64.AppImage

      - name: Upload to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Ladybird-x86_64.AppImage
