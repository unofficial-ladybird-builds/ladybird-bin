name: Build Ladybird Portable (Arch AUR Hardened)

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  schedule:
    - cron: '0 */48 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest

    steps:
      # -------------------------------------------------
      # BASE SYSTEM
      # -------------------------------------------------
      - name: Initialize Arch Linux
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel \
            git \
            sudo \
            ninja \
            cmake \
            curl \
            qt6-base \
            qt6-tools \
            qt6-wayland \
            qt6-multimedia \
            libgl \
            ffmpeg \
            ttf-liberation \
            nasm \
            unzip \
            zip \
            patchelf

      # -------------------------------------------------
      # BUILDER USER
      # -------------------------------------------------
      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      # -------------------------------------------------
      # CLONE AUR
      # -------------------------------------------------
      - name: Clone Ladybird AUR
        run: |
          sudo -u builder git clone https://aur.archlinux.org/ladybird.git /home/builder/ladybird

      # -------------------------------------------------
      # BUILD PACKAGE
      # -------------------------------------------------
      - name: Build Ladybird from AUR
        run: |
          cd /home/builder/ladybird
          sudo -u builder env MAKEFLAGS="-j$(nproc)" makepkg -s --noconfirm

      # -------------------------------------------------
      # CREATE PORTABLE BUNDLE
      # -------------------------------------------------
      - name: Create portable bundle
        run: |
          set -e

          PKG_DIR=$(find /home/builder/ladybird/pkg -type d -name "usr")
          BIN_SOURCE="$PKG_DIR/bin"

          PORTABLE=/home/builder/Ladybird-portable
          mkdir -p "$PORTABLE/bin"
          mkdir -p "$PORTABLE/lib"
          mkdir -p "$PORTABLE/plugins"

          echo "Copying Ladybird executables..."
          for file in "$BIN_SOURCE"/*; do
            if file "$file" | grep -q ELF; then
              cp "$file" "$PORTABLE/bin/"
            fi
          done

          MAIN_BINARY="$PORTABLE/bin/Ladybird"

          echo "Copying runtime shared libraries..."
          ldd "$MAIN_BINARY" | awk '{print $3}' | grep '^/' | while read lib; do
            case "$lib" in
              */ld-linux*|*/libc.so*|*/libm.so*|*/libpthread.so*|*/librt.so*|*/libdl.so*)
                echo "Skipping core libc: $lib"
                ;;
              *)
                cp -v "$lib" "$PORTABLE/lib/"
                ;;
            esac
          done

          echo "Copying Qt6 libraries..."
          for lib in /usr/lib/libQt6*.so*; do
            [ -f "$lib" ] && cp -v "$lib" "$PORTABLE/lib/"
          done

          echo "Copying Qt6 plugins..."
          PLUGIN_DIRS=(
            platforms
            imageformats
            iconengines
            styles
            mediaservice
            audio
            printsupport
            accessible
          )

          for dir in "${PLUGIN_DIRS[@]}"; do
            SRC="/usr/lib/qt6/plugins/$dir"
            DEST="$PORTABLE/plugins/$dir"
            if [ -d "$SRC" ]; then
              mkdir -p "$DEST"
              cp -r "$SRC"/* "$DEST/"
            fi
          done

          echo "Patching RPATH on all executables..."
          for bin in "$PORTABLE/bin/"*; do
            if file "$bin" | grep -q ELF; then
              patchelf --set-rpath '$ORIGIN/../lib' "$bin"
            fi
          done

          echo "Creating launcher..."
          cat > "$PORTABLE/Ladybird.sh" << 'EOF'
          #!/usr/bin/env bash
          DIR="$(cd "$(dirname "$0")" && pwd)"

          export LD_LIBRARY_PATH="$DIR/lib"
          export QT_PLUGIN_PATH="$DIR/plugins"
          export QT_QPA_PLATFORM=xcb

          exec "$DIR/bin/Ladybird" "$@"
          EOF

          chmod +x "$PORTABLE/Ladybird.sh"

      # -------------------------------------------------
      # PACKAGE ZIP
      # -------------------------------------------------
      - name: Package portable zip
        run: |
          cd /home/builder
          zip -r "$GITHUB_WORKSPACE/ladybird-portable-linux.zip" Ladybird-portable

      # -------------------------------------------------
      # UPLOAD ARTIFACT
      # -------------------------------------------------
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-portable-linux
          path: ladybird-portable-linux.zip

      # -------------------------------------------------
      # RELEASE (TAGS ONLY)
      # -------------------------------------------------
      - name: Upload to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ladybird-portable-linux.zip
